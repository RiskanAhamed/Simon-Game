<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Simon Game</title>
<link rel="stylesheet" href="styles.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
<div class="glass">
<h1 id="level-title">Neon Simon</h1>
<div class="stats">
<div>Level: <span id="level">0</span></div>
<div>High Score: <span id="high-score">0</span></div>
</div>
<button id="startBtn">Start Game</button>

<div class="container">
<div id="green" class="btn green"></div>
<div id="red" class="btn red"></div>
<div id="yellow" class="btn yellow"></div>
<div id="blue" class="btn blue"></div>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
